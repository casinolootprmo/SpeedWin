<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Win - Premium Deposit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #030712; color: #f8fafc; min-height: 100vh; scroll-behavior: smooth; }
        .premium-bg { background: radial-gradient(circle at top, #0f172a 0%, #030712 100%); }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .balance-card { background: linear-gradient(135deg, #f43f5e, #f97316); box-shadow: 0 15px 30px rgba(244, 63, 94, 0.2); }
        .method-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s; }
        .method-btn.active { background: rgba(244, 63, 94, 0.15); border-color: #f43f5e; color: #f43f5e; }
        .chip-btn { background: #1f2937; border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.2s; }
        .chip-btn:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .toast-notif { transform: translate(-50%, -40px) scale(0.9); opacity: 0; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast-show { transform: translate(-50%, 0) scale(1); opacity: 1; }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        
        /* Smooth height expand transition for gateway section */
        #payment-gateway-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.5s ease-out, padding 0.4s ease-out;
            opacity: 0;
        }
        #payment-gateway-panel.show-panel {
            max-height: 600px;
            opacity: 1;
            padding-top: 1rem;
        }
    </style>
</head>
<body class="premium-bg pb-24 relative">

    <!-- TOAST NOTIFICATION -->
    <div id="toast-container" class="toast-notif fixed top-6 left-1/2 z-50 bg-slate-900/95 border border-slate-700 px-6 py-3.5 rounded-2xl flex items-center gap-3 shadow-2xl pointer-events-none">
        <span id="toast-icon"></span>
        <span id="toast-text" class="text-xs font-bold tracking-wide"></span>
    </div>

    <!-- NAVBAR HEADER -->
    <div class="w-full bg-slate-950/60 sticky top-0 z-40 border-b border-white/[0.04] p-4 flex justify-between items-center backdrop-blur-xl">
        <a href="dashboard.html" class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-colors bg-white/[0.03] px-3 py-2 rounded-xl border border-white/[0.05] shadow-inner">
            <i class="fa-solid fa-arrow-left text-[10px]"></i> Home
        </a>
        <span class="text-base font-black tracking-wider glow-text italic text-white">SPEED <span class="text-blue-500">WIN</span></span>
        <div class="text-xs font-bold text-slate-400">Deposit Hub</div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-5 space-y-4">
        
        <!-- WALLET BALANCE DISPLAY -->
        <div class="balance-card rounded-2xl p-5 relative overflow-hidden">
            <div class="absolute right-[-20px] bottom-[-20px] w-32 h-32 bg-white/5 rounded-full blur-2xl"></div>
            <div class="flex items-center gap-2 text-white/80 font-bold text-xs uppercase tracking-wider">
                <i class="fa-solid fa-wallet text-sm"></i> Balance
            </div>
            <div class="text-3xl font-black text-white mt-2 tracking-tight flex items-center gap-1">
                ₹<span id="user-balance" class="font-mono">0.00</span>
                <i class="fa-solid fa-rotate text-xs opacity-60 ml-2 animate-spin-slow cursor-pointer"></i>
            </div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-white/10 text-[10px] text-white/60 font-semibold tracking-widest">
                <span>**** ****</span>
                <span>PRO ACCOUNT</span>
            </div>
        </div>

        <!-- MAIN CONTAINER CONSOLE -->
        <div class="glass-card rounded-3xl p-5 space-y-5 shadow-2xl">
            
            <!-- EXCLUSIVE METHOD CHANNEL -->
            <div class="space-y-2">
                <div class="text-[10px] font-black text-slate-400 tracking-wider uppercase flex items-center gap-1.5">
                    <i class="fa-solid fa-network-wired text-blue-500"></i> Deposit Method
                </div>
                <div class="w-full">
                    <div class="method-btn active rounded-xl p-3.5 text-center flex flex-col items-center justify-center gap-1.5">
                        <i class="fa-solid fa-qrcode text-lg text-rose-500"></i>
                        <span class="text-[10px] font-black tracking-widest uppercase">UPI-QR Fast Pay</span>
                    </div>
                </div>
            </div>

            <!-- CHIPS / CHOOSE AMOUNT STAGE -->
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <div class="text-[10px] font-black text-slate-400 tracking-wider uppercase">Deposit Amount</div>
                    <span class="text-[9px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20 uppercase tracking-widest">Extra 100% Bonus 1k+</span>
                </div>
                
                <div class="grid grid-cols-3 gap-2.5">
                    <button onclick="setAmt(200)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs">₹200<br><span class="text-[8px] text-emerald-400">+50% Bonus</span></button>
                    <button onclick="setAmt(300)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs">₹300<br><span class="text-[8px] text-emerald-400">+50% Bonus</span></button>
                    <button onclick="setAmt(500)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs">₹500<br><span class="text-[8px] text-emerald-400">+50% Bonus</span></button>
                    <button onclick="setAmt(1000)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs border-blue-500/40 bg-blue-500/5 shadow-[0_0_10px_rgba(59,130,246,0.1)]">₹1000<br><span class="text-[8px] text-blue-400">+100% Bonus</span></button>
                    <button onclick="setAmt(3000)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs border-blue-500/40 bg-blue-500/5 shadow-[0_0_10px_rgba(59,130,246,0.1)]">₹3000<br><span class="text-[8px] text-blue-400">+100% Bonus</span></button>
                    <button onclick="setAmt(5000)" class="chip-btn rounded-xl py-3 text-center font-bold text-xs border-blue-500/40 bg-blue-500/5 shadow-[0_0_10px_rgba(59,130,246,0.1)]">₹5000<br><span class="text-[8px] text-blue-400">+100% Bonus</span></button>
                </div>

                <div class="bg-slate-950 border border-white/[0.05] rounded-xl px-4 py-3 flex items-center justify-between shadow-inner focus-within:border-blue-500/50 transition-colors">
                    <span class="text-[10px] font-black tracking-wider text-slate-400 uppercase">Input Amount</span>
                    <div class="flex items-center gap-1">
                        <span class="text-slate-500 font-bold text-sm">₹</span>
                        <input type="number" id="deposit-amount" placeholder="Minimum 200" oninput="validateAndTriggerGateway(this.value)"
                            class="w-28 bg-transparent text-right font-black text-white text-base focus:outline-none placeholder:text-slate-700 font-mono">
                    </div>
                </div>
            </div>

            <!-- GATEWAY DYNAMIC SUBPANEL (AUTOMATICALLY SLIDES OPEN) -->
            <div id="payment-gateway-panel" class="border-t border-white/[0.05] space-y-4">
                <div class="border border-blue-500/20 rounded-2xl p-4 text-center bg-blue-950/20 relative">
                    <span class="text-[9px] font-black text-blue-400 block mb-3 uppercase tracking-widest">Scan QR Code to Transfer</span>
                    <img src="https://raw.githubusercontent.com/casinolootprmo/laughing-happiness/refs/heads/main/IMG_20260717_200323_055.jpg" alt="Payment QR" class="w-44 h-44 mx-auto rounded-xl border border-white/10 p-1.5 bg-white">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-wider">Submit 12-Digit UTR / Ref Number</label>
                    <input type="text" id="deposit-utr" maxlength="12" placeholder="Enter Ref Number here" class="w-full bg-slate-950 border border-white/[0.05] rounded-xl px-4 py-3.5 text-sm text-white font-mono font-bold tracking-widest placeholder:tracking-normal focus:outline-none focus:border-blue-500 shadow-inner">
                </div>

                <button onclick="submitDeposit()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-950 font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg shadow-emerald-500/10 active:scale-[0.99]">Confirm Deposit</button>
            </div>

        </div>
    </div>

    <!-- PERSISTENT APP BAR -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#0f172a]/95 border-t border-white/[0.04] py-3 flex justify-around items-center z-40 backdrop-blur-md">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-[10px] font-medium text-slate-400"><i class="fa-solid fa-gamepad text-base"></i><span>Play</span></a>
        <a href="deposit.html" class="flex flex-col items-center gap-1 text-[10px] font-black text-blue-500"><i class="fa-solid fa-circle-plus text-base"></i><span>Deposit</span></a>
        <a href="withdraw.html" class="flex flex-col items-center gap-1 text-[10px] font-medium text-slate-400"><i class="fa-solid fa-money-bill-wave text-base"></i><span>Withdraw</span></a>
        <a href="referral.html" class="flex flex-col items-center gap-1 text-[10px] font-medium text-slate-400"><i class="fa-solid fa-users text-base"></i><span>Refer</span></a>
        <a href="account.html" class="flex flex-col items-center gap-1 text-[10px] font-medium text-slate-400"><i class="fa-solid fa-user text-base"></i><span>Account</span></a>
    </div>

    <!-- ENGINE SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUaiTQtM_Wx4AKZpRC0zu2MVxwp9DXZoc",
            authDomain: "test-15cde.firebaseapp.com",
            projectId: "test-15cde",
            storageBucket: "test-15cde.firebasestorage.app",
            messagingSenderId: "741080887085",
            appId: "1:741080887085:web:7631394ba98fd20da2eda4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userId = localStorage.getItem('sw_user_id');

        if(!userId) { window.location.href = "index.html"; }

        let userProfile = null;
        let isPanelVisible = false;
        
        window.setAmt = function(val) { 
            document.getElementById('deposit-amount').value = val;
            autoOpenGateway(val);
        };

        window.validateAndTriggerGateway = function(val) {
            const amt = parseFloat(val);
            autoOpenGateway(amt);
        };

        function autoOpenGateway(amount) {
            const panel = document.getElementById('payment-gateway-panel');
            if (!isNaN(amount) && amount >= 200) {
                if(!isPanelVisible) {
                    panel.classList.add('show-panel');
                    isPanelVisible = true;
                    showNotice("QR Generated! Complete payment & enter UTR.", true);
                    
                    // Automatically smooth scroll down to QR block
                    setTimeout(() => {
                        panel.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 300);
                }
            } else {
                panel.classList.remove('show-panel');
                isPanelVisible = false;
            }
        }

        window.showNotice = function(msg, isSuccess = false) {
            const container = document.getElementById('toast-container');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-text');
            text.innerText = msg;
            
            container.classList.remove('toast-show');
            
            if(isSuccess) {
                container.className = "toast-notif fixed top-6 left-1/2 z-50 bg-emerald-950/95 border border-emerald-500/40 text-emerald-400 px-6 py-3.5 rounded-2xl flex items-center gap-3 shadow-2xl pointer-events-auto toast-show font-bold";
                icon.innerHTML = "<i class='fa-solid fa-circle-check text-base'></i>";
            } else {
                container.className = "toast-notif fixed top-6 left-1/2 z-50 bg-red-950/95 border border-red-500/40 text-red-400 px-6 py-3.5 rounded-2xl flex items-center gap-3 shadow-2xl pointer-events-auto toast-show font-bold";
                icon.innerHTML = "<i class='fa-solid fa-triangle-exclamation text-base'></i>";
            }
            setTimeout(() => { container.classList.remove('toast-show'); }, 2000);
        };

        onSnapshot(doc(db, "speed_users", userId), (snap) => { 
            if(snap.exists()) {
                userProfile = snap.data(); 
                document.getElementById('user-balance').innerText = parseFloat(userProfile.balance).toFixed(2);
            }
        });

        window.submitDeposit = async function() {
            if (!userProfile) { showNotice("Loading data, please wait..."); return; }
            
            const amt = parseFloat(document.getElementById('deposit-amount').value);
            const utr = document.getElementById('deposit-utr').value.trim();

            if(isNaN(amt) || amt < 200) { showNotice("Minimum deposit is ₹200!"); return; }
            if(utr.length < 12) { showNotice("UTR number must be 12 digits!"); return; }

            let bonus = amt >= 1000 ? amt : (amt * 0.5);
            let totalWithBonus = amt + bonus;

            try {
                await addDoc(collection(db, "speed_ledgers"), {
                    userDocId: userId, 
                    gmail: userProfile.gmail || "N/A", 
                    uid: userProfile.uid || "N/A",
                    phone: userProfile.phone || "N/A",
                    amount: amt,
                    bonusAmount: bonus,
                    totalCredit: totalWithBonus,
                    type: 'DEPOSIT', 
                    status: 'PENDING', 
                    details: "UTR ID: " + utr + " | Bonus: +" + (amt >= 1000 ? "100%" : "50%"), 
                    epochTime: Date.now()
                });

                showNotice("Success! Request sent with Bonus applied.", true);
                document.getElementById('deposit-utr').value = '';
                document.getElementById('deposit-amount').value = '';
                
                document.getElementById('payment-gateway-panel').classList.remove('show-panel');
                isPanelVisible = false;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                showNotice("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
